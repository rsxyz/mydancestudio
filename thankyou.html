<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Soul Taal</title>
    <!-- Bootstrap CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <!-- Bootstrap Icons for the success checkmark -->
    <link rel="stylesheet" href="https://jsdelivr.net">
</head>
<body class="bg-custom-light d-flex align-items-center min-vh-100">

    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6 text-center">
                <!-- Branded Card Container -->
                <div class="card border-0 shadow-sm p-5">
                    <div class="card-body">
                        <!-- Success Checkmark Icon -->
                        <div class="text-brand-secondary display-1 mb-4">
                            <i class="bi bi-check-circle-fill"></i>
                        </div>
                        
                        <!-- Main Header -->
                        <h1 class="display-4 fw-bold text-brand-primary mb-3">Thank You!</h1>
                        
                        <!-- Confirmation Subtext -->
                        <p class="lead text-muted mb-5">
                            Your inquiry has been submitted successfully. We will review your details and get back to your inbox shortly.
                        </p>
                        
                        <!-- Return Button using custom styling framework -->
                        <a href="index.html" class="btn btn-custom btn-lg px-5 py-3 shadow-sm">
                            <i class="bi bi-house-door-fill me-2"></i>Return to Home
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS Bundle -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
