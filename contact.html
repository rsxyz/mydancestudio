<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Soul Taal Kathak</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://jsdelivr.net" rel="stylesheet">
  <!-- Optional: Bootstrap Icons -->
  <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- PAGE HEADER -->
  <header class="bg-primary text-white text-center py-5 mb-5">
    <div class="container">
      <h1 class="display-4 fw-bold">Contact Us</h1>
      <p class="lead">Home / Contact Us</p>
    </div>
  </header>

  <!-- MAIN CONTENT CONTAINER -->
  <main class="container mb-5">
    <div class="row g-5">
      
      <!-- LEFT COLUMN: Contact Form -->
      <div class="col-lg-7">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm">
          <h2 class="fw-bold mb-2">Contact Form</h2>
          <p class="text-muted mb-4">Fill out the form below and we will get back to you shortly.</p>
          
          <form action="#" method="POST">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
              </div>
              <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" required>
              </div>
              <div class="col-12">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone">
              </div>
              <div class="col-12">
                <label for="subject" class="form-label">Interest Track</label>
                <select class="form-select" id="subject">
                  <option selected>Select an option...</option>
                  <option value="classical">Classical Kathak Classes</option>
                  <option value="semi-classical">Semi-Classical Classes</option>
                  <option value="company">Booking the Performing Company</option>
                  <option value="other">General Inquiry</option>
                </select>
              </div>
              <div class="col-12">
                <label for="message" class="form-label">Your Message</label>
                <textarea class="form-control" id="message" rows="5" required></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100">Submit Form</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- RIGHT COLUMN: More Info Panel -->
      <div class="col-lg-5">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm h-100 d-flex flex-column justify-content-between">
          <div>
            <h2 class="fw-bold mb-4">More Info</h2>
            
            <!-- Location -->
            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3">
                <i class="bi bi-geo-alt-fill"></i>
              </div>
              <div>
                <h5 class="fw-bold mb-1">Soul Taal Kathak Academy</h5>
                <p class="text-muted mb-0">Walnut, CA, USA</p>
              </div>
            </div>

            <!-- Email -->
            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3">
                <i class="bi bi-envelope-fill"></i>
              </div>
              <div>
                <h5 class="fw-bold mb-1">Email Us</h5>
                <p class="text-muted mb-0"><a href="mailto:info@Soul Taal Kathak.com" class="text-decoration-none">info@Soul Taal Kathak.com</a></p>
              </div>
            </div>

            <!-- Phone -->
            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3">
                <i class="bi bi-telephone-fill"></i>
              </div>
              <div>
                <h5 class="fw-bold mb-1">Call Us</h5>
                <p class="text-muted mb-0"><a href="tel:9095551234" class="text-decoration-none">909.555.1234</a></p>
              </div>
            </div>
          </div>

          <!-- Social Media Follow Block -->
          <div class="border-top pt-4 mt-4">
            <h5 class="fw-bold mb-3">Follow Us</h5>
            <div class="d-flex gap-3 fs-4">
              <a href="#" class="text-primary"><i class="bi bi-facebook"></i></a>
              <a href="#" class="text-info"><i class="bi bi-twitter-x"></i></a>
              <a href="#" class="text-danger"><i class="bi bi-instagram"></i></a>
            </div>
          </div>
          
        </div>
      </div>

    </div>
  </main>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://jsdelivr.net"></script>
</body>
</html>
