<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soul Taal</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="bg-light">

  <!-- NAVBAR TO RETURN HOME -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Soul Taal Kathak</a>
      <a class="btn btn-outline-light btn-sm" href="index.html">Back to Home</a>
    </div>
  </nav>

  <!-- PAGE HEADER -->
  <header class="bg-primary text-white text-center py-5 mb-5">
    <div class="container">
      <h1 class="display-4 fw-bold">Contact Us</h1>
      <p class="lead mb-0"><a href="index.html" class="text-white-50 text-decoration-none">Home</a> / Contact Us</p>
    </div>
  </header>

  <!-- MAIN CONTACT LAYOUT CONTAINER -->
  <main class="container mb-5">
    <div class="row g-5">
      
      <!-- LEFT COLUMN: FormSubmit.co Integration -->
      <div class="col-lg-7">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm">
          <h2 class="fw-bold mb-2">Contact Form</h2>
          <p class="text-muted mb-4">Submit your details below. We will reply to your inbox directly.</p>
          
          <!-- FORMSUBMIT CONFIGURATION -->
          <form target="_blank" action="https://formsubmit.co/world.rs@gmail.com" method="POST">
            
            <!-- Anti-Spam HoneyPot (Hidden from users) -->
            <input type="text" name="_honey" style="display:none">
            
            <!-- Optional Configuration: Disables the FormSubmit confirmation redirection landing page -->
            
  <input type="hidden" name="_next" value="https://rsxyz.github.io/mydancestudio/thankyou.html">
  <input type="hidden" name="_template" value="table">
  <input type="hidden" name="_url" value="https://rsxyz.github.io/mydancestudio/index.html">
  <input type="hidden" name="_subject" value="New Student Inquiry">            
            <div class="row g-3">
              <div class="col-md-6">
                <label for="firstName" class="form-label">First Name</label>
                <input type="text" name="First Name" class="form-control" id="firstName" required>
              </div>
              <div class="col-md-6">
                <label for="lastName" class="form-label">Last Name</label>
                <input type="text" name="Last Name" class="form-control" id="lastName" required>
              </div>
              <div class="col-12">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" id="email" required>
              </div>
              <div class="col-12">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" name="Phone" class="form-control" id="phone">
              </div>
              <div class="col-12">
                <label for="subject" class="form-label">Interest Track</label>
                <select name="Dance Interest" class="form-select" id="subject">
                  <option selected value="General Inquiry">Select an option...</option>
                  <option value="Classical Kathak">Classical Kathak Classes</option>
                  <option value="Semi-Classical">Semi-Classical Classes</option>
                  <option value="Performance Booking">Booking the Performing Company</option>
                </select>
              </div>
              <div class="col-12">
                <label for="message" class="form-label">Your Message</label>
                <textarea name="Message Content" class="form-control" id="message" rows="5" required></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100">Submit Form</button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- RIGHT COLUMN: Direct Studio Info -->
      <div class="col-lg-5">
        <div class="bg-white p-4 p-md-5 rounded shadow-sm h-100 d-flex flex-column justify-content-between">
          <div>
            <h2 class="fw-bold mb-4">Studio Details</h2>
            
            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3"><i class="bi bi-geo-alt-fill"></i></div>
              <div>
                <h5 class="fw-bold mb-1">Soul Taal Kathak </h5>
                <p class="text-muted mb-0">Plano, TX </p>
              </div>
            </div>

            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3"><i class="bi bi-envelope-fill"></i></div>
              <div>
                <h5 class="fw-bold mb-1">Email Us</h5>
                <p class="text-muted mb-0">soultaalkathak@gmail.com</p>
              </div>
            </div>

            <div class="d-flex align-items-start mb-4">
              <div class="text-primary fs-3 me-3"><i class="bi bi-telephone-fill"></i></div>
              <div>
                <h5 class="fw-bold mb-1">Call Us</h5>
                <p class="text-muted mb-0">111.222.3333</p>
              </div>
            </div>
          </div>

          <div class="border-top pt-4 mt-4">
            <h5 class="fw-bold mb-3">Connect With Our Community</h5>
            <div class="d-flex gap-3 fs-4">
              <a href="#" class="text-primary"><i class="bi bi-facebook"></i></a>
              <a href="#" class="text-info"><i class="bi bi-twitter-x"></i></a>
              <a href="#" class="text-danger"><i class="bi bi-instagram"></i></a>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

<!-- 1. Fetch Bootstrap JavaScript Bundle from the CDN -->
<script src="https://jsdelivr.net"></script>

<!-- 2. Fetch your local JavaScript file -->
<script src="script.js"></script>

</body>
</html>
